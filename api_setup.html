<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pickaxe Drop — API Setup</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0d0d2b; font-family: Arial, sans-serif; color: #fff; padding: 20px;
    }
    .setup-box {
      background: #1a1a2e; border: 2px solid #00ff88; border-radius: 16px;
      padding: 28px 32px; max-width: 480px; width: 100%;
      box-shadow: 0 0 40px rgba(0,255,136,0.2);
    }
    .setup-box h2 { color: #00ff88; font-size: 20px; margin: 8px 0 4px; }
    .setup-box p { font-size: 13px; color: #aaa; margin-bottom: 16px; }
    label { font-size: 12px; color: #888; display: block; margin-bottom: 4px; }
    input[type="text"] {
      width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #333;
      background: #0d0d1a; color: #fff; font-size: 14px; margin-bottom: 12px; outline: none;
    }
    .msg { border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; font-size: 12px; display: none; }
    .msg-error { background: rgba(255,68,68,0.15); border: 1px solid #ff4444; color: #ff8888; }
    .msg-ok { background: rgba(0,255,136,0.1); border: 1px solid #00ff88; color: #00ff88; }
    .btn-row { display: flex; gap: 8px; margin-top: 4px; }
    .btn-primary {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      background: #00ff88; color: #000; font-weight: bold; font-size: 14px; cursor: pointer;
    }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .keys-section { margin-top: 16px; }
    .keys-section h4 { font-size: 12px; color: #888; margin-bottom: 6px; }
    .key-row {
      display: flex; align-items: center; gap: 6px; padding: 5px 0;
      font-size: 12px; border-bottom: 1px solid #222;
    }
    .key-status { font-size: 14px; }
    .key-name { flex: 1; color: #ccc; font-family: monospace; }
    .key-err { color: #666; font-size: 10px; }
    .key-del { background: none; border: none; color: #ff4444; cursor: pointer; font-size: 14px; padding: 2px 6px; }
  </style>
</head>
<body>
  <div class="setup-box">
    <div style="text-align:center; margin-bottom:18px;">
      <div style="font-size:36px;">⛏️</div>
      <h2>Pickaxe Drop — API Setup</h2>
      <p>Enter your YouTube API Key and Channel ID to connect the live chat.</p>
    </div>
    <div id="errMsg" class="msg msg-error"></div>
    <div id="okMsg" class="msg msg-ok"></div>
    <label>Channel ID</label>
    <input id="channelInput" type="text" placeholder="UC_xxxxxxxxxxxxxxxxxx" />
    <label>YouTube API Key</label>
    <input id="keyInput" type="text" placeholder="AIzaSy..." />
    <div class="btn-row">
      <button id="testBtn" class="btn-primary" onclick="doTest()">Test & Save</button>
      <button id="findLiveBtn" onclick="doFindLive()" style="padding:10px 14px; border:1px solid #00aaff; border-radius:8px; background:transparent; color:#00aaff; font-size:13px; cursor:pointer; display:none;">🔍 Find Live</button>
    </div>
    <div id="keysSection" class="keys-section" style="display:none;">
      <h4>Your registered API keys:</h4>
      <div id="keysList"></div>
    </div>
  </div>
<script>
  var channelId = localStorage.getItem('pd_channel_id') || '';
  if (channelId) document.getElementById('channelInput').value = channelId;

  function showErr(msg) { var e = document.getElementById('errMsg'); e.textContent = msg; e.style.display = 'block'; document.getElementById('okMsg').style.display = 'none'; }
  function showOk(msg) { var e = document.getElementById('okMsg'); e.textContent = msg; e.style.display = 'block'; document.getElementById('errMsg').style.display = 'none'; }
  function hideMsg() { document.getElementById('errMsg').style.display = 'none'; document.getElementById('okMsg').style.display = 'none'; }

  function loadKeys() {
    if (!channelId) return;
    fetch('api_manager.php?action=get_keys&channel_id=' + encodeURIComponent(channelId))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var sec = document.getElementById('keysSection');
        var list = document.getElementById('keysList');
        if (!data.ok || !data.keys || data.keys.length === 0) { sec.style.display = 'none'; return; }
        sec.style.display = 'block';
        var html = '';
        data.keys.forEach(function(k) {
          var color = k.status === 'ok' ? '#00ff88' : '#ff4444';
          var icon = k.status === 'ok' ? '✓' : '✗';
          html += '<div class="key-row">';
          html += '<span class="key-status" style="color:' + color + '">' + icon + '</span>';
          html += '<span class="key-name">' + k.keyMasked + '</span>';
          html += '<span class="key-err">' + (k.lastError || k.status) + '</span>';
          html += '</div>';
        });
        list.innerHTML = html;
      }).catch(function() {});
  }
  loadKeys();

  function doTest() {
    var btn = document.getElementById('testBtn');
    var ch = document.getElementById('channelInput').value.trim();
    var key = document.getElementById('keyInput').value.trim();
    hideMsg();
    if (!ch) { showErr('Channel ID is required.'); return; }
    if (!key) { showErr('API Key is required.'); return; }
    btn.textContent = 'Testing...'; btn.disabled = true;

    fetch('api_manager.php', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'test_key', api_key: key, channel_id: ch })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.ok) { btn.textContent = 'Test & Save'; btn.disabled = false; showErr(data.error || 'Test failed.'); return; }
      return fetch('api_manager.php', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'register_key', api_key: key, channel_id: ch })
      }).then(function(r) { return r.json(); }).then(function(reg) {
        btn.textContent = 'Test & Save'; btn.disabled = false;
        if (!reg.ok) { showErr(reg.error || 'Registration failed.'); return; }
        channelId = ch;
        localStorage.setItem('pd_channel_id', ch);
        showOk('Key saved! ' + (data.channelTitle ? '(' + data.channelTitle + ') ' : '') + reg.totalKeys + ' key(s) registered. You can close this tab.');
        loadKeys();
        // Show Find Live button
        document.getElementById('findLiveBtn').style.display = 'inline-block';
        // Notify the game window if it opened us
        if (window.opener && !window.opener.closed) {
          try { window.opener._apiKeyUpdated = true; } catch(e) {}
        }
      });
    })
    .catch(function(e) { btn.textContent = 'Test & Save'; btn.disabled = false; showErr('Network error: ' + e.message); });
  }

  function doFindLive() {
    var btn = document.getElementById('findLiveBtn');
    var ch = document.getElementById('channelInput').value.trim();
    if (!ch) { showErr('Channel ID is required.'); return; }
    // Get active key for this channel
    hideMsg();
    btn.textContent = '🔍 Searching...'; btn.disabled = true;
    fetch('api_manager.php?action=get_active_key&channel_id=' + encodeURIComponent(ch))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.ok || !data.activeKey) {
          btn.textContent = '🔍 Find Live'; btn.disabled = false;
          showErr('No active API key found. Save a key first.');
          return;
        }
        return fetch('api_manager.php', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'resolve_live', channel_id: ch, api_key: data.activeKey })
        }).then(function(r) { return r.json(); }).then(function(res) {
          btn.textContent = '🔍 Find Live'; btn.disabled = false;
          if (res.ok && res.liveChatId) {
            showOk('Live found! Chat ID resolved and saved.');
            if (window.opener && !window.opener.closed) {
              try { window.opener._apiKeyUpdated = true; } catch(e) {}
            }
          } else {
            showErr('No active live found on this channel.');
          }
        });
      })
      .catch(function(e) { btn.textContent = '🔍 Find Live'; btn.disabled = false; showErr('Network error: ' + e.message); });
  }

  // Show Find Live button if channel already has keys
  if (channelId) {
    fetch('api_manager.php?action=get_active_key&channel_id=' + encodeURIComponent(channelId))
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok && data.activeKey) document.getElementById('findLiveBtn').style.display = 'inline-block';
      }).catch(function() {});
  }
</script>
</body>
</html>
